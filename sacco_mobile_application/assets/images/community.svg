<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="primaryGradient" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4CAF50" />
      <stop offset="1" stop-color="#2E7D32" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle (Abstract Community) -->
  <circle cx="200" cy="150" r="120" fill="url(#primaryGradient)" opacity="0.1" />
  <circle cx="200" cy="150" r="90" fill="url(#primaryGradient)" opacity="0.2" />

  <!-- People Icons (Stylized) -->
  <!-- Person 1 (Center) -->
  <g transform="translate(160, 100)" filter="url(#shadow)">
    <circle cx="40" cy="30" r="20" fill="#2E7D32" />
    <path d="M10,80 Q40,40 70,80 V100 H10 Z" fill="#2E7D32" />
  </g>

  <!-- Person 2 (Left) -->
  <g transform="translate(90, 120)" filter="url(#shadow)">
    <circle cx="35" cy="25" r="18" fill="#66BB6A" />
    <path d="M5,70 Q35,35 65,70 V90 H5 Z" fill="#66BB6A" />
  </g>

  <!-- Person 3 (Right) -->
  <g transform="translate(240, 120)" filter="url(#shadow)">
    <circle cx="35" cy="25" r="18" fill="#66BB6A" />
    <path d="M5,70 Q35,35 65,70 V90 H5 Z" fill="#66BB6A" />
  </g>

  <!-- Connecting Lines (Network/Community) -->
  <path d="M125,145 L160,140" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4 4" />
  <path d="M240,140 L275,145" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4 4" />
  
  <!-- Coin/Finance Element -->
  <circle cx="200" cy="220" r="25" fill="#FFC107" filter="url(#shadow)" />
  <text x="200" y="228" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">$</text>
</svg>
