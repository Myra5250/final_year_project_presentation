<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#66BB6A" />
      <stop offset="100%" stop-color="#2E7D32" />
    </radialGradient>
    <filter id="dropShadow">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
        <feOffset dx="2" dy="2" result="offsetblur" />
        <feComponentTransfer>
            <feFuncA type="linear" slope="0.5"/>
        </feComponentTransfer>
        <feMerge> 
            <feMergeNode />
            <feMergeNode in="SourceGraphic" /> 
        </feMerge>
    </filter>
  </defs>

  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="180" stroke="#4CAF50" stroke-width="10" fill="none" opacity="0.2"/>
  <circle cx="200" cy="200" r="160" stroke="#81C784" stroke-width="5" fill="none" opacity="0.5"/>

  <!-- Shield Shape -->
  <path d="M200 50 L330 110 V200 C330 280 275 350 200 380 C125 350 70 280 70 200 V110 L200 50 Z" 
        fill="url(#grad1)" stroke="white" stroke-width="4" filter="url(#dropShadow)"/>

  <!-- Hand Holding Coin/Plant -->
  <path d="M130 250 Q200 300 270 250" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
  
  <!-- Plant -->
  <path d="M200 250 V150" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <path d="M200 200 Q160 180 150 150" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M200 180 Q240 160 250 130" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
  
  <!-- Leaf Details -->
  <circle cx="150" cy="150" r="10" fill="#A5D6A7"/>
  <circle cx="250" cy="130" r="10" fill="#A5D6A7"/>
  <circle cx="200" cy="150" r="12" fill="#A5D6A7"/>

  <!-- Text Initials if needed, abstract representation -->
  <text x="200" y="320" font-family="Arial" font-size="24" fill="white" text-anchor="middle" font-weight="bold">SACCO</text>
</svg>
