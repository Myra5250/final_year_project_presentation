<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="growthGradient" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#81C784" />
      <stop offset="1" stop-color="#388E3C" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Graph Grid -->
  <path d="M50,250 H350" stroke="#E0E0E0" stroke-width="2" />
  <path d="M50,200 H350" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="5 5" />
  <path d="M50,150 H350" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="5 5" />
  <path d="M50,100 H350" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="5 5" />

  <!-- Growing Plant/Chart -->
  <!-- Stem -->
  <path d="M200,250 Q200,200 200,150" stroke="#4CAF50" stroke-width="4" stroke-linecap="round" />
  
  <!-- Leaves -->
  <path d="M200,200 Q180,180 160,190 Q180,210 200,200 Z" fill="#66BB6A" />
  <path d="M200,170 Q220,150 240,160 Q220,180 200,170 Z" fill="#66BB6A" />
  <path d="M200,150 Q170,120 190,100 Q210,120 200,150 Z" fill="#81C784" />

  <!-- Chart Line Rising -->
  <path d="M60,240 L120,200 L180,210 L240,140 L300,100 L340,60" 
        stroke="#FFC107" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />
  
  <!-- Points on Chart -->
  <circle cx="60" cy="240" r="5" fill="#FFA000" />
  <circle cx="120" cy="200" r="5" fill="#FFA000" />
  <circle cx="180" cy="210" r="5" fill="#FFA000" />
  <circle cx="240" cy="140" r="5" fill="#FFA000" />
  <circle cx="300" cy="100" r="5" fill="#FFA000" />
  <circle cx="340" cy="60" r="5" fill="#FFA000" />

  <!-- Arrow Head -->
  <path d="M330,60 L340,60 L340,70" stroke="#FFC107" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

</svg>
